<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>StitchTrack Pro</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StitchTrack">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="sync-status" style="position:fixed; top:0; right:10px; z-index:9999; font-size:11px; background:rgba(0,0,0,0.7); color:#fff; padding:4px 10px; border-radius:0 0 8px 8px; font-weight:bold; display:none;">
    <i class="fas fa-sync-alt fa-spin"></i> Syncing Offline Data...
  </div>

  <div class="app">
    <main class="main">
      
      <div id="view-dashboard" class="page-view active-view">
        <div class="page-header" style="margin-top: 10px;">
          <h2><i class="fas fa-scissors" style="color:var(--primary); font-size:24px; margin-right:8px;"></i>StitchTrack</h2>
          <div style="background:var(--primary-light); color:var(--primary); width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="openModal('order')">
            <i class="fas fa-plus"></i>
          </div>
        </div>
        <button id="installAppBtn" class="action-btn" style="margin-top:12px; margin-bottom:20px; background:#1C1C1E; display:none; gap:8px; justify-content:center; align-items:center;">
          <i class="fas fa-download"></i> Install StitchTrack App
        </button>
        <div class="nav-grid">
          <div class="nav-card">
            <i class="fas fa-users"></i>
            <div id="s-clients" class="count">--</div>
            <small>Clients Profile</small>
          </div>
          <div class="nav-card">
            <i class="fas fa-tape"></i>
            <div id="s-pending" class="count">--</div>
            <small>Active Jobs</small>
          </div>
          <div class="nav-card">
            <i class="fas fa-mitten"></i>
            <div id="s-review" class="count">--</div>
            <small>Fitting Alerts</small>
          </div>
          <div class="nav-card">
            <i class="fas fa-file-invoice"></i>
            <div style="font-size:26px; margin-top:2px; font-weight:800; color:var(--text);"><i class="fas fa-print"></i></div>
            <small>Invoices</small>
          </div>
        </div>

        <div style="margin-top:20px;">
          <button class="action-btn" onclick="openModal('customer')"><i class="fas fa-user-plus"></i> Register Client Profile</button>
          <button class="action-btn" style="margin-top:12px; background:var(--primary);" onclick="openModal('order')"><i class="fas fa-file-signature"></i> Create New Design Order</button>
        </div>
      </div>

      <div id="view-customers" class="page-view">
        <div class="page-header">
          <h2>Studio Clients</h2>
        </div>
        <div id="customer-master-list"></div>
      </div>

      <div id="view-orders" class="page-view">
        <div class="page-header">
          <h2>Tracker</h2>
        </div>
        <div style="margin-bottom: 20px;">
          <select id="order-status-filter" onchange="refreshData('orders')" style="background:#fff; border-color:transparent; box-shadow:0 2px 8px rgba(0,0,0,0.05); font-weight:700;">
            <option value="ALL">All Production Jobs</option>
            <option value="Measurements Taken">Measurements Taken</option>
            <option value="Cutting Phase">Cutting Phase</option>
            <option value="Sewing Construction">Sewing Construction</option>
            <option value="Fitting / Review">Fitting / Review</option>
            <option value="Completed Ready">Completed Ready</option>
            <option value="Delivered">Delivered & Handed Over</option>
          </select>
        </div>
        <div id="order-master-list"></div>
      </div>

      <div id="view-reports" class="page-view">
        <div class="page-header">
          <h2>Invoices</h2>
        </div>
        <div class="card">
          <label>Choose Active Studio Order Brief:</label>
          <select id="rep-order-sel"></select>
          <button class="action-btn" style="background:var(--primary); margin-top:15px; box-shadow: 0 4px 12px rgba(107, 76, 230, 0.3);" onclick="compileStudioInvoice()">Generate Invoice</button>
        </div>

        <div id="report-onscreen-preview-card" class="card" style="display:none;">
          <h4 style="text-transform:uppercase; font-weight:800; margin-bottom:15px; font-size:14px !important; color:var(--muted);"><i class="fas fa-eye"></i> Preview</h4>
          <div id="report-preview-viewport" style="max-height:350px; overflow-y:auto; background:#fff; border:1px solid var(--border); border-radius:12px; padding:15px; font-size:14px !important; font-weight:normal !important;"></div>
          
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
            <button class="action-btn" style="background:#25D366; font-size:14px !important; padding:14px;" onclick="sendWhatsAppSummary()">
              <i class="fab fa-whatsapp"></i> WhatsApp
            </button>
            <button class="action-btn" style="background:var(--success); font-size:14px !important; padding:14px;" onclick="window.print()">
              <i class="fas fa-print"></i> Print A4
            </button>
            <button class="action-btn" style="background:var(--primary); grid-column:span 2; padding:14px; font-size: 16px !important;" onclick="shareInvoicePDF()">
              <i class="fas fa-share-nodes"></i> Share PDF
            </button>
          </div>
        </div>
      </div>

    </main>
    
    <nav class="bottom-nav">
      <div class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard')">
        <i class="fas fa-home"></i><span>Home</span>
      </div>
      <div class="nav-item" id="nav-customers" onclick="showPage('customers')">
        <i class="fas fa-users"></i><span>Clients</span>
      </div>
      <div class="nav-item" id="nav-orders" onclick="showPage('orders')">
        <i class="fas fa-tape"></i><span>Jobs</span>
      </div>
      <div class="nav-item" id="nav-reports" onclick="showPage('reports')">
        <i class="fas fa-file-invoice"></i><span>Invoices</span>
      </div>
    </nav>
  </div>

  <div id="report-print-container"></div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle" style="font-size:22px; font-weight:800; margin-bottom:15px;">Form</h3>
      <div id="modalBody"></div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="action-btn" style="background:#E5E5EA; color:#1C1C1E; font-size: 18px !important; padding: 14px;" onclick="closeModal()">Cancel</button>
        <button class="action-btn" style="background:var(--primary); font-size: 18px !important; padding: 14px;" id="modalSubmit">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
